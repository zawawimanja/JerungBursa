name: Bursa Live Data Scraper

on:
  schedule:
    - cron: '*/10 1-9 * * 1-5'
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd smart-money-tracker
          npm install
      
      - name: Install Puppeteer browsers
        run: |
          cd smart-money-tracker
          npx puppeteer browsers install chrome
          
      - name: Run Puppeteer Scraper
        run: |
          cd smart-money-tracker
          node scrape-real.js
          
      - name: Commit and Push changes
        run: |
          git config --global user.name "Bursa Bot Action"
          git config --global user.email "bot@smartmoneytracker.local"
          git add smart-money-tracker/live_data.json smart-money-tracker/history/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update live_data.json & history [skip ci]" && git push)