name: Bursa Live Data Scraper

on:
  schedule:
    - cron: '*/10 1-9 * * 1-5'
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Puppeteer
        uses: actions/cache@v3
        with:
          path: /home/runner/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('smart-money-tracker/package.json') }}
          restore-keys: puppeteer-${{ runner.os }}-

      - name: Install dependencies
        run: |
          cd smart-money-tracker
          npm install --legacy-peer-deps
      
      - name: Install Chrome
        run: |
          cd smart-money-tracker
          npx puppeteer browsers install chrome --with-dependencies
          
      - name: Run Puppeteer Scraper
        env:
          PUPPETEER_CACHE_DIR: /home/runner/.cache/puppeteer
        run: |
          cd smart-money-tracker
          node scrape-real.js
          
      - name: Commit and Push changes
        run: |
          git config --global user.name "Bursa Bot Action"
          git config --global user.email "bot@smartmoneytracker.local"
          git add smart-money-tracker/live_data.json smart-money-tracker/history/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update live_data.json & history [skip ci]" && git push)