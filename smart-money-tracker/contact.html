<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hubungi Kami | JerungBursa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(22, 28, 45, 0.7);
            --panel-border: rgba(51, 65, 85, 0.5);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.08) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            padding: 2rem 1.5rem;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2.5rem;
            text-align: center;
            border-bottom: 1px solid rgba(51, 65, 85, 0.3);
            padding-bottom: 1.5rem;
        }

        header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #a5b4fc 0%, #6366f1 50%, #34d399 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .nav-links {
            display: flex;
            gap: 0.8rem;
            justify-content: flex-start;
            margin-bottom: 2rem;
        }

        .btn-nav {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--panel-border);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .btn-nav:hover {
            color: white;
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.15);
        }

        .glass-card {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 3rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .form-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .form-group input, .form-group textarea {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--panel-border);
            color: white;
            outline: none;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.2);
        }

        .btn-submit {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            background: #4f46e5;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }

        footer {
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(51, 65, 85, 0.3);
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        footer a {
            color: var(--text-muted);
            text-decoration: none;
            margin: 0 0.75rem;
            transition: color 0.2s;
        }

        footer a:hover {
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-links">
            <a href="index.html" class="btn-nav">
                ← Tracker Utama
            </a>
        </div>

        <header>
            <h1>Hubungi Kami</h1>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Sila hubungi kami jika mempunyai sebarang pertanyaan atau cadangan.</p>
        </header>

        <main class="glass-card">
            <div style="text-align: center; margin-bottom: 2rem; color: #cbd5e1; font-size: 0.95rem;">
                <p>E-mel sokongan rasmi kami: <strong style="color: #6366f1;">support@jerungbursa.my</strong></p>
                <p>Kuala Lumpur, Malaysia</p>
            </div>

            <form onsubmit="event.preventDefault(); alert('Terima kasih kerana menghubungi kami! Kami akan maklum balas e-mel anda secepat mungkin.'); this.reset();">
                <div class="form-group">
                    <label for="name">Nama Anda</label>
                    <input type="text" id="name" required placeholder="Contoh: Muhammad Ali">
                </div>
                <div class="form-group">
                    <label for="email">Alamat E-mel</label>
                    <input type="email" id="email" required placeholder="Contoh: ali@gmail.com">
                </div>
                <div class="form-group">
                    <label for="subject">Subjek</label>
                    <input type="text" id="subject" required placeholder="Maklum Balas / Pembetulan Data / Kerjasama">
                </div>
                <div class="form-group">
                    <label for="message">Mesej Anda</label>
                    <textarea id="message" rows="5" required placeholder="Tulis mesej anda di sini..."></textarea>
                </div>
                <button type="submit" class="btn-submit">
                    Hantar Mesej
                </button>
            </form>
        </main>

        <footer>
            <p>&copy; 2026 JerungBursa. All rights reserved.</p>
            <div style="margin-top: 1rem;">
                <a href="privacy-policy.html">Dasar Privasi</a>
                <a href="terms.html">Syarat Perkhidmatan</a>
                <a href="about.html">Mengenai Kami</a>
                <a href="contact.html" style="color: white; font-weight: 600;">Hubungi Kami</a>
            </div>
        </footer>
    </div>
</body>
</html>
