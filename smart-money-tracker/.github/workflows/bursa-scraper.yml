name: Bursa Smart Money Auto-Scraper

on:
  schedule:
    # Run at 08:30 UTC which is 4:30 PM Malaysia Time (Isnin hingga Jumaat)
    - cron: '30 8 * * 1-5'
  workflow_dispatch: # Membenarkan anda tekan butang 'Run' secara manual di GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Wajib untuk benarkan GitHub update file live_data.json
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth node-fetch@2

      - name: Run Bursa Smart Money Scraper
        run: node scrape-real.js

      - name: Commit and Push live_data.json
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add live_data.json
          git add history/
          git commit -m "🤖 Auto-update data Smart Money Bursa: $(date)" || exit 0
          git push
